<!DOCTYPE html>
<html>
<head>
    <title>Deaf Hub - Speak</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <h1>Speak a Word</h1>
        <button onclick="submitVoiceWord()">Speak</button>
        <div id="result"></div>
    </div>

    <script>
        async function submitVoiceWord() {
            const response = await fetch('/voice', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            });

            const data = await response.json();
            if (response.ok) {
                displayResult(data);
            } else {
                document.getElementById('result').innerHTML = `<p>${data.error}</p>`;
            }
        }

        function displayResult(data) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `
                <h2>Spoken Word: ${data.spoken_word}</h2>
                <h2>Corrected Word: ${data.corrected_word}</h2>
            `;
            if (data.image) {
                resultDiv.innerHTML += `<img src="data:image/jpeg;base64,${data.image}" alt="${data.corrected_word}" />`;
            } else {
                resultDiv.innerHTML += `<p>No image found for: ${data.corrected_word}</p>`;
            }
        }
    </script>
</body>
</html>
